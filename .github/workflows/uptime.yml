name: Uptime Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  uptime-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Maintenance Window
        run: |
          CURRENT_TIME=$(date -u -d "-3 hours" +"%H%M")
          DATE_SEED=$(date -u -d "-3 hours" +"%Y%m%d")
          
          RANDOM_OFFSET=$(echo "$DATE_SEED" | awk '{print ($1 % 60)}')
          
          STOP_LIMIT=$(( 2235 + RANDOM_OFFSET ))
          START_LIMIT=$(( 0600 + RANDOM_OFFSET ))
          
          echo "Current: $CURRENT_TIME | Today's Stop: $STOP_LIMIT | Today's Start: $START_LIMIT"
          
          if [ "$CURRENT_TIME" -ge "$STOP_LIMIT" ] || [ "$CURRENT_TIME" -lt "$START_LIMIT" ]; then
            echo "Sleeping hours. Skipping update to mimic human behavior."
            exit 0
          fi

      - name: Initialize Environment
        run: |
          SEC=$(( ( RANDOM % 900 )  + 600 ))
          sleep $SEC

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
        
      - name: Install dependencies
        run: pip install requests --quiet
          
      - name: Run internal metrics
        id: monitor
        run: |
          python monitor.py
          echo "MONITOR_EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Pre-build Optimization
        run: sleep $(( ( RANDOM % 300 )  + 300 ))
          
      - name: Build static assets
        run: python generate_static_blog.py
          
      - name: Sync branches
        id: changes
        run: |
          if git diff --exit-code history.json index.html uptime-badge.json blog.html blog/*.html; then
            echo "CHANGES=false" >> $GITHUB_OUTPUT
          else
            echo "CHANGES=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit changes
        if: steps.changes.outputs.CHANGES == 'true'
        run: |
          git config user.name "PkLavc"
          git config user.email "patrickajm@gmail.com"
          
          NEW_BRANCH="patch-$(openssl rand -hex 4)"
          echo "SRE_BRANCH=$NEW_BRANCH" >> $GITHUB_ENV
          
          git fetch origin main
          git checkout -b $NEW_BRANCH origin/main

          git reset --hard
          git add .
          
          MESSAGES=("docs: update monitoring logs" "feat: refresh dashboard data" "chore: sync system metrics" "fix: update uptime status")
          RANDOM_MSG=${MESSAGES[$(( RANDOM % ${#MESSAGES[@]} ))]}
          
          git commit -m "$RANDOM_MSG"
          git push origin $NEW_BRANCH --force

      - name: Validation Period
        if: steps.changes.outputs.CHANGES == 'true'
        run: |
          SEC=$(( ( RANDOM % 1200 )  + 900 ))
          sleep $SEC

      - name: Merge updates
        if: steps.changes.outputs.CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_SHARK }}
        run: |
          PR_TITLE="SRE: System Metrics Update $(date +'%H:%M')"
          
          # Cria o PR e captura a URL
          PR_URL=$(gh pr create --title "$PR_TITLE" --body "Synchronization of observability metrics." --base main --head ${{ env.SRE_BRANCH }})
          
          # Pequeno delay para o GitHub processar o PR
          sleep $(( ( RANDOM % 60 ) + 30 ))
          
          # Tenta o merge com squash e deleta a branch após sucesso
          gh pr merge "$PR_URL" --squash --delete-branch --admin
