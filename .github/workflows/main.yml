name: Uptime Bot
on:
  schedule:
    - cron: "0 * * * *" # Roda de 1 em 1 hora
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Check
        run: python monitor.py
        
      - name: Auto PR and Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configura identidade
          git config user.name "PkLavc"
          git config user.email "patrickajm@gmail.com"
          
          # Cria nome de branch único com timestamp para evitar conflitos
          BRANCH="status-$(date +%s)"
          
          # Cria e muda para a branch
          git checkout -b $BRANCH
          
          # Adiciona o log, commita e sobe com force
          git add uptime_log.txt
          git commit -m "chore: update uptime status"
          git push origin $BRANCH --force
          
          # Cria o Pull Request
          PR_URL=$(gh pr create \
            --title "Uptime Check: $(date +'%Y-%m-%d %H:%M')" \
            --body "Automated uptime check for pklavc.github.io" \
            --base main \
            --head $BRANCH)
          
          # Faz o Merge automático
          gh pr merge $PR_URL --merge --admin
